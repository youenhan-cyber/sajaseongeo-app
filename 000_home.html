<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한자 카드 헌터</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  background: linear-gradient(to bottom,
    #1E3A5F 0%, #1A2E50 30%, #112244 60%, #0D1F3C 80%, #0A1628 100%
  );
}
.stars {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(1.5px 1.5px at 10% 8%,  rgba(255,255,255,0.7) 0%, transparent 100%),
    radial-gradient(1px   1px   at 30% 20%,  rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(2px   2px   at 55% 6%,   rgba(61,217,196,0.6)  0%, transparent 100%),
    radial-gradient(1px   1px   at 75% 15%,  rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 90% 30%,  rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px   1px   at 20% 55%,  rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px   1px   at 65% 70%,  rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(2px   2px   at 40% 85%,  rgba(61,217,196,0.2)  0%, transparent 100%);
}

/* ── 헤더 ── */
header {
  position: relative; z-index: 1;
  padding: 24px 16px 12px;
  max-width: 420px; margin: 0 auto;
}
.app-row {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 12px;
}
.app-logo-title {
  display: flex; align-items: center; gap: 8px;
}
.app-logo { font-size: 28px; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-5px);} }
.app-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 20px; font-weight: 900; color: white;
  text-shadow: 0 0 16px rgba(61,217,196,0.4);
}
.app-title span { color: #3DD9C4; }

/* 레벨 카드 */
.level-card {
  display: flex; align-items: center; gap: 10px;
  background: rgba(61,217,196,0.08);
  border: 1.5px solid rgba(61,217,196,0.25);
  border-radius: 14px; padding: 10px 14px;
}
.level-icon { font-size: 24px; }
.level-info { flex: 1; }
.level-name { font-size: 12px; font-weight: 700; color: #3DD9C4; margin-bottom: 4px; }
.level-bar-track { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
.level-bar-fill  { height: 100%; background: linear-gradient(90deg,#3DD9C4,#6EE8D8); border-radius: 3px; transition: width 1.2s ease; }
.level-cards-text { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 3px; }

/* 챕터 */
.chapter-label {
  position: relative; z-index: 1;
  text-align: center; padding: 10px 0 6px;
}
.chapter-badge {
  display: inline-block;
  background: linear-gradient(135deg,#3DD9C4,#2BC4B0);
  color: #0D1B35; font-size: 12px; font-weight: 900;
  padding: 5px 16px; border-radius: 20px; letter-spacing: 1px;
  box-shadow: 0 3px 12px rgba(61,217,196,0.35);
}

/* ── 맵 ── */
.map-wrap {
  position: relative; z-index: 1;
  max-width: 420px; margin: 0 auto;
  padding: 4px 16px 16px;
}

/* 연결선 */
.path-line {
  display: flex; justify-content: center; align-items: center;
  height: 32px; position: relative;
}
.path-line::before {
  content: ''; position: absolute;
  width: 3px; height: 100%;
  left: 50%; transform: translateX(-50%);
  border-radius: 2px;
}
.path-line.done-line::before   { background: linear-gradient(to bottom, rgba(61,217,196,0.6), rgba(61,217,196,0.2)); }
.path-line.future-line::before { background: rgba(255,255,255,0.07); }
.path-arrow {
  font-size: 16px; position: relative; z-index: 1;
  background: #0D1628; padding: 0 5px; border-radius: 4px; line-height: 1;
}
.path-line.done-line   .path-arrow { color: rgba(61,217,196,0.6); }
.path-line.future-line .path-arrow { color: rgba(255,255,255,0.1); }

/* 스테이지 행 */
.stage-row {
  display: flex; align-items: center; gap: 12px;
  animation: fadeIn 0.45s both;
}
.stage-row.right { flex-direction: row-reverse; }
@keyframes fadeIn {
  from { opacity:0; transform: translateY(16px); }
  to   { opacity:1; transform: translateY(0); }
}

/* 노드 버튼 */
.node-btn {
  width: 72px; height: 72px; flex-shrink: 0;
  border-radius: 20px; border: none;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  cursor: pointer; position: relative;
  transition: transform 0.15s;
}
.node-btn:active { transform: scale(0.92); }
.node-btn.done {
  background: linear-gradient(135deg,#1E4A7F,#2A6AAF);
  box-shadow: 0 4px 14px rgba(30,74,127,0.55);
}
.node-btn.current {
  background: linear-gradient(135deg,#3DD9C4,#2BC4B0);
  box-shadow: 0 4px 22px rgba(61,217,196,0.7);
  animation: nodePulse 1.8s ease-in-out infinite;
}
@keyframes nodePulse {
  0%,100% { box-shadow: 0 4px 22px rgba(61,217,196,0.7); transform: scale(1); }
  50%      { box-shadow: 0 6px 30px rgba(61,217,196,0.95); transform: scale(1.05); }
}
.node-btn.locked {
  background: rgba(255,255,255,0.04);
  border: 2px dashed rgba(255,255,255,0.1);
  cursor: default;
}
.node-btn.locked:active { transform: none; }

.node-emoji { font-size: 26px; line-height: 1; }
.node-num   { font-size: 10px; font-weight: 900; color: rgba(255,255,255,0.4); }
.node-btn.current .node-num { color: rgba(13,27,53,0.65); }
.node-btn.done    .node-num { color: #3DD9C4; }

.node-stamp {
  position: absolute; top: -8px; right: -8px;
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; background: #0A1628;
  box-shadow: 0 2px 6px rgba(0,0,0,0.5);
}

/* 정보 카드 */
.node-info {
  flex: 1; border-radius: 14px; padding: 11px 13px;
  border: 1px solid transparent; max-width: 215px;
}
.node-info.done-info    { background: rgba(61,217,196,0.06);  border-color: rgba(61,217,196,0.2); }
.node-info.current-info { background: rgba(61,217,196,0.10);  border-color: rgba(61,217,196,0.4); }
.node-info.locked-info  { background: rgba(255,255,255,0.025); opacity: 0.38; }

.info-hanja  { font-family:'Noto Serif KR',serif; font-size:15px; font-weight:900; letter-spacing:3px; margin-bottom:2px; }
.info-korean { font-size:13px; font-weight:700; margin-bottom:3px; }
.info-meaning{ font-size:11px; line-height:1.5; }

.done-text    { color:#3DD9C4; }
.current-text { color:white; }
.locked-text  { color:rgba(255,255,255,0.22); }
.info-meaning.done-text    { color:rgba(255,255,255,0.5); }
.info-meaning.current-text { color:rgba(255,255,255,0.75); }

.tap-hint {
  display: inline-block; margin-top: 6px;
  background: #3DD9C4; color: #0D1B35;
  font-size: 11px; font-weight: 900;
  padding: 3px 10px; border-radius: 10px;
  animation: blink 1.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

.grade-row {
  display: flex; align-items: center; gap: 4px;
  margin-top: 5px; font-size: 11px; color: rgba(255,255,255,0.5);
}

/* 맨 아래 왕국 목표 */
.bottom-goal {
  position: relative; z-index: 1;
  text-align: center; padding: 6px 0 32px;
}
.goal-inner {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(61,217,196,0.06);
  border: 1px dashed rgba(61,217,196,0.2);
  border-radius: 20px; padding: 8px 20px;
  font-size: 13px; color: rgba(61,217,196,0.5);
  font-weight: 700; letter-spacing: 1px;
}

/* 팝업 */
.popup-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,0.82);
  display: none; align-items: center; justify-content: center; z-index: 100;
}
.popup-bg.show { display: flex; }
.popup-box {
  background: linear-gradient(135deg,#1E3A5F,#0D2040);
  border: 2px solid #3DD9C4; border-radius: 28px;
  padding: 36px 28px; text-align: center;
  max-width: 300px; width: 90%;
  animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn {
  from { transform:scale(0.6) rotate(-5deg); opacity:0; }
  to   { transform:scale(1) rotate(0); opacity:1; }
}
.popup-emoji { font-size: 56px; margin-bottom: 12px; animation: float 2s ease-in-out infinite; }
.popup-title { font-family:'Noto Serif KR',serif; font-size:21px; font-weight:900; color:#3DD9C4; letter-spacing:2px; margin-bottom:8px; }
.popup-desc  { font-size:14px; color:rgba(255,255,255,0.75); line-height:1.7; margin-bottom:22px; white-space:pre-line; }
.popup-btn   { width:100%; padding:14px; background:linear-gradient(135deg,#3DD9C4,#2BC4B0); color:#0D1B35; border:none; border-radius:14px; font-size:16px; font-weight:900; font-family:'Noto Sans KR',sans-serif; cursor:pointer; }

/* 빈 칸 안내 (앞으로 추가될 스테이지) */
.coming-soon {
  text-align: center;
  padding: 16px;
  font-size: 12px;
  color: rgba(255,255,255,0.3);
  font-weight: 700;
}
</style>
</head>
<body>
<div class="stars"></div>

<!-- 헤더 -->
<header>
  <div class="app-row">
    <div class="app-logo-title">
      <div class="app-logo">🃏</div>
      <div class="app-title">한자 카드 <span>헌터</span></div>
    </div>
  </div>
  <div class="level-card">
    <div class="level-icon" id="lvIcon">🌱</div>
    <div class="level-info">
      <div class="level-name" id="lvName">새싹 학자 Lv.1</div>
      <div class="level-bar-track"><div class="level-bar-fill" id="lvBar" style="width:0%"></div></div>
      <div class="level-cards-text" id="lvCards">한자 카드 0 / 20장</div>
    </div>
  </div>
</header>

<div class="chapter-label">
  <div class="chapter-badge">🌱 첫 번째 모험</div>
</div>

<!-- 맵 (위→아래, 지그재그) -->
<div class="map-wrap" id="mapWrap"></div>

<div class="coming-soon">✨ 더 많은 사자성어가 곧 찾아와요!</div>

<!-- 맨 아래 목표 -->
<div class="bottom-goal">
  <div class="goal-inner">👑 사자성어 왕국까지 올라가자!</div>
</div>

<!-- 팝업 -->
<div class="popup-bg" id="popup">
  <div class="popup-box">
    <div class="popup-emoji">🔓</div>
    <div class="popup-title" id="popupTitle">해금!</div>
    <div class="popup-desc"  id="popupDesc"></div>
    <button class="popup-btn" onclick="closePopup()">신난다! 도전할게요 🚀</button>
  </div>
</div>

<script>
// ── 스테이지 목록 (사자성어 추가될 때마다 여기에 한 줄씩 추가) ──
const stages = [
  { id:'gyeonmulsangsim',   hanja:'見物生心', korean:'견물생심', meaning:'물건을 보면 갖고 싶은 마음이 생긴다', emoji:'👀', file:'001_gyeonmulsangsim.html' },
  { id:'ilseogiijo',        hanja:'一石二鳥', korean:'일석이조', meaning:'돌 하나로 새 두 마리를 잡는다',      emoji:'🐦', file:'002_ilseogiijo.html' },
  { id:'dongmunseodam',     hanja:'東問西答', korean:'동문서답', meaning:'동쪽을 물었는데 서쪽을 답한다',     emoji:'🤔', file:'003_dongmunseodam.html' },
  { id:'gojingamrae',       hanja:'苦盡甘來', korean:'고진감래', meaning:'쓴 것이 다하면 단 것이 온다',        emoji:'🍬', file:'004_gojingamrae.html' },
  { id:'jaksimsaril',       hanja:'作心三日', korean:'작심삼일', meaning:'결심이 사흘을 못 간다',             emoji:'📅', file:'005_jaksimsaril.html' },
  { id:'review1',           hanja:'★ 復習 ★', korean:'복습 코너', meaning:'지금까지 배운 다섯 사자성어를 모두 모아 복습해요!', emoji:'🏆', file:'006_review_01.html' },
  { id:'sipsiilban',        hanja:'十匙一飯', korean:'십시일반', meaning:'여러 사람이 조금씩 도우면 큰 도움이 된다', emoji:'🍚', file:'007_sipsiilban.html' },
  { id:'geumsangcheomhwa',  hanja:'錦上添花', korean:'금상첨화', meaning:'좋은 일에 더 좋은 일이 더해진다',     emoji:'🌸', file:'008_geumsangcheomhwa.html' },
  { id:'jaeopjadeuk',       hanja:'自業自得', korean:'자업자득', meaning:'자기가 저지른 일의 결과는 자기 스스로 받게 된다', emoji:'⚖️', file:'009_jaeopjadeuk.html' },
];

const gradeEmoji = { legendary:'🏆', diamond:'💎', gold:'🥇', silver:'🥈', bronze:'🥉' };
const gradeLabel  = { legendary:'레전더리', diamond:'다이아', gold:'골드', silver:'실버', bronze:'브론즈' };

function getProgress() {
  try { return JSON.parse(localStorage.getItem('sajasungeo_progress')||'{}'); } catch(e){return{};}
}
function getUnlockedIdx() {
  const p = getProgress(); let idx=0;
  for(let i=0;i<stages.length;i++){
    if(p[stages[i].id]) idx=i+1; else break;
  }
  return Math.min(idx, stages.length-1);
}

function renderLevel() {
  let total=0;
  try{total=parseInt(localStorage.getItem('hanjaCards')||'0');}catch(e){}
  const levels=[
    {name:'새싹 학자 Lv.1',icon:'🌱',max:20},
    {name:'견습 학자 Lv.2',icon:'📖',max:50},
    {name:'어휘 탐험가 Lv.3',icon:'🗺️',max:80},
    {name:'한자 수집가 Lv.4',icon:'🏅',max:100},
    {name:'사자성어 마스터 Lv.5',icon:'👑',max:999},
  ];
  let li=0,pm=0;
  for(let i=0;i<levels.length;i++){
    if(total<=levels[i].max){li=i;break;}
    pm=levels[i].max; if(i===levels.length-1)li=i;
  }
  const lv=levels[li];
  const pct=Math.min(100,Math.round(((total-pm)/(lv.max-pm))*100));
  document.getElementById('lvIcon').textContent=lv.icon;
  document.getElementById('lvName').textContent=lv.name;
  document.getElementById('lvCards').textContent=`한자 카드 ${total} / ${lv.max}장`;
  setTimeout(()=>{document.getElementById('lvBar').style.width=pct+'%';},400);
}

function renderMap() {
  const prog=getProgress();
  const unlockedIdx=getUnlockedIdx();
  const wrap=document.getElementById('mapWrap');
  wrap.innerHTML='';

  stages.forEach((s,i)=>{
    const isDone    = !!prog[s.id];
    const isCurrent = !isDone && i===unlockedIdx;
    const isLocked  = !isDone && i>unlockedIdx;
    const grade     = prog[s.id]?.grade;

    const stateClass = isDone?'done':isCurrent?'current':'locked';
    const textClass  = isDone?'done-text':isCurrent?'current-text':'locked-text';
    const infoClass  = isDone?'done-info':isCurrent?'current-info':'locked-info';
    const rowClass   = i%2===0?'':'right';

    const stamp   = isDone&&grade?`<div class="node-stamp">${gradeEmoji[grade]}</div>`:'';
    const gradeRow= isDone&&grade?`<div class="grade-row">${gradeEmoji[grade]} <span>${gradeLabel[grade]}</span></div>`:'';
    const tapHint = isCurrent?`<div class="tap-hint">▶ 지금 도전!</div>`:'';
    const meaning = isLocked?'🔒 ???':s.meaning;

    const row=document.createElement('div');
    row.className=`stage-row ${rowClass}`;
    row.style.animationDelay=(i*0.07)+'s';
    row.innerHTML=`
      <button class="node-btn ${stateClass}" onclick="${!isLocked?`goStage('${s.file}')`:''}" >
        ${stamp}
        <div class="node-emoji">${isLocked?'🔒':s.emoji}</div>
        <div class="node-num">${i+1}</div>
      </button>
      <div class="node-info ${infoClass}">
        <div class="info-hanja  ${textClass}">${s.hanja}</div>
        <div class="info-korean ${textClass}">${s.korean}</div>
        <div class="info-meaning ${textClass}">${meaning}</div>
        ${gradeRow}${tapHint}
      </div>`;
    wrap.appendChild(row);

    if(i<stages.length-1){
      const lineClass = isDone?'done-line':'future-line';
      const conn=document.createElement('div');
      conn.className=`path-line ${lineClass}`;
      conn.innerHTML=`<div class="path-arrow">↓</div>`;
      wrap.appendChild(conn);
    }
  });
}

function goStage(file){ window.location.href=file; }

function checkNewUnlock(){
  const nu=sessionStorage.getItem('newUnlock');
  if(!nu)return;
  sessionStorage.removeItem('newUnlock');
  const idx=parseInt(nu);
  if(idx<stages.length){
    document.getElementById('popupTitle').textContent=stages[idx].korean+' 해금! 🎉';
    document.getElementById('popupDesc').textContent=
      `${stages[idx-1]?.korean}을(를) 완료했어요!\n\n이제 ${stages[idx].emoji} ${stages[idx].korean}에 도전할 수 있어요!`;
    document.getElementById('popup').classList.add('show');
  }
}
function closePopup(){ document.getElementById('popup').classList.remove('show'); }

renderLevel();
renderMap();
checkNewUnlock();
</script>
</body>
</html>
